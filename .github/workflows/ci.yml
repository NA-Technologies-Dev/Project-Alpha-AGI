name: Alpha-AGI CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        REQ_FILE=""
        for f in *; do
          [ -f "$f" ] || continue
          if [ "$(printf '%s' "$f" | tr '[:upper:]' '[:lower:]')" = "requirements.txt" ]; then
            REQ_FILE="$f"
            break
          fi
        done
        if [ -n "$REQ_FILE" ]; then
          pip install -r "$REQ_FILE"
        else
          echo "No requirements file found (case-insensitive match for requirements.txt)."
          ls -la
          exit 1
        fi

    - name: Run Core Architecture Tests
      run: |
        PYTHONPATH=. python3 arch_a/tests.py

    - name: Run Phase 6 Unit Tests
      run: |
        PYTHONPATH=. python3 -m unittest discover tests

    - name: Run Pre-train Smoke Gates
      run: |
        PYTHONPATH=. python3 scripts/run_gates.py
