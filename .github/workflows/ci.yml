name: Alpha-AGI CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        shopt -s nullglob
        req_files=([Rr][Ee][Qq][Uu][Ii][Rr][Ee][Mm][Ee][Nn][Tt][Ss].[Tt][Xx][Tt])
        shopt -u nullglob
        REQ_FILE="${req_files[0]}"
        if [ -n "$REQ_FILE" ]; then
          pip install -r "$REQ_FILE"
        else
          echo "No requirements file found in $(pwd) (case-insensitive match for requirements.txt)."
          ls -la
          exit 1
        fi

    - name: Run Core Architecture Tests
      run: |
        PYTHONPATH=. python3 arch_a/tests.py

    - name: Run Phase 6 Unit Tests
      run: |
        PYTHONPATH=. python3 -m unittest discover tests

    - name: Run Pre-train Smoke Gates
      run: |
        PYTHONPATH=. python3 scripts/run_gates.py
